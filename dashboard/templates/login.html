<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tolvas — Ingreso</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      background: linear-gradient(135deg, #1b4332 0%, #40916c 100%);
    }
    .login-card {
      border: none;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    }
    .brand-icon { font-size: 3.5rem; }
    .btn-login {
      background: #2d6a4f;
      border: none;
      border-radius: 10px;
      font-weight: 600;
      letter-spacing: .5px;
    }
    .btn-login:hover { background: #1b4332; }
    .form-control:focus { border-color: #40916c; box-shadow: 0 0 0 .2rem rgba(64,145,108,.25); }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-xl-4 col-lg-5 col-md-7 col-sm-10">
      <div class="card login-card p-4 p-md-5">

        <div class="text-center mb-4">
          <div class="brand-icon">🌾</div>
          <h2 class="fw-bold mt-2 mb-0">Tolvas</h2>
          <p class="text-muted">Panel de seguimiento de descargas</p>
        </div>

        {% if error %}
        <div class="alert alert-danger rounded-3 py-2">{{ error }}</div>
        {% endif %}

        <form method="POST">
          <div class="mb-4">
            <label class="form-label fw-semibold">Tu Telegram ID</label>
            <input
              type="text"
              name="telegram_id"
              class="form-control form-control-lg"
              placeholder="Ej: 123456789"
              autofocus
              required
            >
            <div class="form-text mt-1">
              Encontralo enviándole un mensaje a
              <a href="https://t.me/userinfobot" target="_blank">@userinfobot</a> en Telegram.
            </div>
          </div>
          <button type="submit" class="btn btn-login btn-success w-100 btn-lg">
            Ingresar
          </button>
        </form>

      </div>
    </div>
  </div>
</div>
</body>
</html>
